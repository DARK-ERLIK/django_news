{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
</head>
<body>
  <h2>Вход</h2>
  <form method="post">
    {% csrf_token %}
    <label>Имя пользователя:</label>
    <input type="text" name="username" required>
    <label>Пароль:</label>
    <input type="password" name="password" required>
    <button type="submit">Войти</button>
  </form>
</body>
</html>
