{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Новости</title>
    <link rel="stylesheet" type="text/css" href="{% static 'css/style.css' %}">
</head>
<body>
    <h1>Последние новости</h1>
    <ul>
        {% for news in news_list %}
            <li><h2>{{ news.title }}</h2><p>{{ news.content }}</p><small>{{ news.created_at }}</small></li>
        {% empty %}
            <li>Новостей пока нет.</li>
        {% endfor %}
    </ul>
</body>
</html>
